services:
  deno_devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deno_devcontainer
    restart: unless-stopped
    volumes:
      - .:/workspace
    ports:
      - '3000:3000'
    healthcheck:
      test: [
        'CMD',
        'deno',
        'eval',
        "const res = await fetch('http://localhost:3000', {headers: {'Accept': 'application/nostr+json'}}); if (!res.ok) Deno.exit(1);",
      ]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
