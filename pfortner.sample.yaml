# pfortner.sample.yaml
# Copy to pfortner.yaml and customize

server:
  port: 3000
  upstream_relay: 'ws://localhost:7777'
  # upstream_raw_url: "http://localhost:7777"
  idle_timeout: 600
  x_forwarded_for: false

  shutdown:
    drain_timeout: 30
    force_after: 30

  connections:
    max: 10000
    max_per_ip: 50
    pressure:
      soft_limit_percent: 90
      auth_grace_period: 30

auth:
  enabled: true
  send_on_connect: true
  max_attempts: 10
  allowed_time_duration: 600
  allowed_future_time_duration: 60

# Admin UI — served at /admin on the main port
# admin:
#   enabled: true
#   auth_token: 'change-me-secret-token'
#   path: '/admin'
#   # Trust X-Forwarded-Proto/Host and Forwarded only behind a proxy that strips client-supplied values.
#   trust_proxy: false
#   # port: 9090  # optional: also expose admin API on a separate port

# infra:
#   metrics:
#     logging:
#       format: json
#       level: info

pipelines:
  client:
    - policy: write-guard
      config:
        require_auth: false
    - policy: accept

  server:
    - policy: protected-event
      config:
        require_auth: true
    - policy: accept
